<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turno de Clase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #F0F2FF;
      --surface:   #FFFFFF;
      --pri:       #4361EE;
      --pri-h:     #3451D1;
      --pri-l:     #EEF2FF;
      --green:     #2F9E44;
      --green-l:   #EBFBEE;
      --amber:     #E67700;
      --amber-l:   #FFF9DB;
      --red:       #C92A2A;
      --red-l:     #FFE3E3;
      --txt:       #1C1F26;
      --txt-m:     #6B7280;
      --border:    #E5E7EB;
      --shadow:    0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.16);
      --r:         14px;
      --r-sm:      9px;
      --pill:      100px;
      --font:      'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      padding: 16px 16px 80px;
    }

    #app { max-width: 480px; margin: 0 auto; }

    /* ── Buttons ── */
    button { font-family: var(--font); cursor: pointer; border: none; }

    .btn-primary {
      background: var(--pri); color: #fff;
      border-radius: var(--r-sm); padding: 12px 18px;
      font-size: 14px; font-weight: 600; transition: background .15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { background: var(--pri-h); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary.full { width: 100%; justify-content: center; }

    .btn-ghost {
      background: none; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 10px 16px;
      font-size: 14px; font-weight: 500; color: var(--txt-m);
      transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--txt-m); color: var(--txt); }

    .btn-outline {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 13px;
      font-size: 13px; font-weight: 500; color: var(--txt-m);
      display: inline-flex; align-items: center; gap: 5px;
      transition: all .15s;
    }
    .btn-outline:hover { border-color: var(--pri); color: var(--pri); background: var(--pri-l); }

    .btn-danger {
      background: var(--red-l); color: var(--red);
      border-radius: var(--r-sm); padding: 10px 16px;
      font-size: 14px; font-weight: 600; transition: background .15s;
    }
    .btn-danger:hover { background: #ffc9c9; }

    .btn-icon {
      width: 34px; height: 34px; border-radius: var(--r-sm);
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; transition: all .15s; flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--red); background: var(--red-l); }

    .btn-confirm {
      background: var(--pri); color: #fff;
      border-radius: var(--r-sm); padding: 8px 14px;
      font-size: 13px; font-weight: 600; white-space: nowrap;
      transition: background .15s;
    }
    .btn-confirm:hover { background: var(--pri-h); }

    /* ── Layout ── */
    .app-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 16px; padding-top: 6px;
    }
    .header-actions { display: flex; gap: 8px; }
    .app-title { font-size: 22px; font-weight: 700; letter-spacing: -.5px; line-height: 1.2; }
    .app-meta  { display: flex; align-items: center; gap: 8px; margin-top: 6px; }

    .round-pill {
      display: inline-flex; align-items: center;
      background: var(--pri-l); color: var(--pri);
      border-radius: var(--pill); padding: 3px 10px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }

    .txt-m { color: var(--txt-m); font-size: 13px; }
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: var(--txt-m); margin-bottom: 8px;
    }

    /* ── Progress card ── */
    .progress-card {
      background: var(--surface); border-radius: var(--r);
      padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 12px;
    }
    .progress-inner { display: flex; align-items: center; gap: 16px; }
    .progress-frac  { font-size: 34px; font-weight: 700; color: var(--pri); line-height: 1; white-space: nowrap; }
    .progress-frac sup { font-size: 16px; color: var(--txt-m); font-weight: 500; vertical-align: super; }
    .progress-meta  { flex: 1; }
    .progress-text  { font-size: 12px; color: var(--txt-m); margin-bottom: 7px; }
    .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; background: linear-gradient(90deg, var(--pri), #9B59B6); border-radius: 3px; transition: width .5s ease; }

    /* ── Assignment cards ── */
    .assign-card {
      display: flex; align-items: center; gap: 12px;
      border-left: 4px solid var(--amber); border-radius: var(--r);
      background: var(--surface); padding: 14px 16px;
      box-shadow: var(--shadow); margin-bottom: 8px;
      transition: border-color .2s;
    }
    .assign-card.done { border-left-color: var(--green); }
    .assign-card.done .product-chip { background: var(--green-l); color: var(--green); }

    .product-chip {
      min-width: 40px; height: 40px; border-radius: 9px;
      background: var(--amber-l); color: var(--amber);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800; flex-shrink: 0; letter-spacing: -.3px;
    }

    .assign-info { flex: 1; min-width: 0; }
    .assign-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .assign-sub  { font-size: 12px; color: var(--txt-m); margin-top: 1px; }
    .chip-done   { background: var(--green-l); color: var(--green); border-radius: var(--r-sm); padding: 6px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; }

    .no-assign { background: var(--surface); border-radius: var(--r); padding: 18px 20px; box-shadow: var(--shadow); color: var(--txt-m); font-size: 14px; text-align: center; margin-bottom: 8px; }

    /* ── Action bar ── */
    .action-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .action-bar .btn-primary { flex: 1; }

    /* ── Member list ── */
    .member-list { display: flex; flex-direction: column; gap: 6px; }

    .member-row {
      background: var(--surface); border-radius: var(--r);
      padding: 13px 16px; display: flex; align-items: center;
      box-shadow: var(--shadow); border-left: 4px solid transparent;
      transition: border-color .25s;
    }
    .member-row.pending   { border-left-color: #D1D5DB; }
    .member-row.assigned  { border-left-color: var(--amber); }
    .member-row.completed { border-left-color: var(--green); }

    .member-info { flex: 1; min-width: 0; }
    .member-name {
      font-weight: 600; font-size: 15px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-row.completed .member-name {
      color: var(--txt-m);
      text-decoration: line-through;
      text-decoration-color: var(--green);
    }

    .member-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }

    .tag { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: var(--pill); display: inline-flex; align-items: center; gap: 3px; }
    .tag-a    { background: var(--amber-l); color: #92400E; }
    .tag-b    { background: #EFF6FF;        color: #1D4ED8; }
    .tag-date { background: var(--green-l); color: var(--green); }

    /* ── Empty state ── */
    .empty { background: var(--surface); border-radius: var(--r); padding: 48px 24px; text-align: center; box-shadow: var(--shadow); }
    .empty-icon  { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-weight: 700; font-size: 16px; margin-bottom: 6px; }

    /* ── Bottom sheets (modals) ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.45);
      align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }

    .sheet {
      background: var(--surface); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 480px; max-height: 90vh;
      overflow-y: auto; padding: 6px 24px 36px;
      box-shadow: var(--shadow-lg);
    }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 20px; }
    .sheet-title  { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--txt-m); margin-bottom: 6px;
    }
    .form-control {
      width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 15px; font-family: var(--font);
      color: var(--txt); background: var(--surface);
      outline: none; transition: border-color .15s; appearance: none;
    }
    .form-control:focus { border-color: var(--pri); }
    .form-hint { font-size: 12px; color: var(--txt-m); margin-top: 4px; }

    .sheet-actions { display: flex; gap: 8px; margin-top: 24px; }
    .sheet-actions .btn-primary { flex: 1; }

    .divider { height: 1px; background: var(--border); margin: 18px 0; }

    /* Edit member rows */
    .edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .edit-row input {
      flex: 1; padding: 10px 12px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 14px; font-family: var(--font);
      outline: none; transition: border-color .15s; color: var(--txt);
    }
    .edit-row input:focus  { border-color: var(--pri); }
    .edit-row input.error  { border-color: var(--red); }

    .btn-add-row {
      width: 100%; margin-top: 4px; padding: 10px;
      border: 2px dashed var(--border); border-radius: var(--r-sm);
      background: none; color: var(--txt-m); font-size: 14px; font-weight: 500;
      transition: all .15s; font-family: var(--font);
    }
    .btn-add-row:hover { border-color: var(--pri); color: var(--pri); background: var(--pri-l); }

    /* Danger zone */
    .danger-zone { padding-top: 4px; }
    .danger-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--red); margin-bottom: 8px; }
    .danger-desc  { font-size: 13px; color: var(--txt-m); margin-bottom: 12px; line-height: 1.5; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1C1F26; color: #fff;
      padding: 11px 22px; border-radius: var(--pill);
      font-size: 14px; font-weight: 500;
      box-shadow: var(--shadow-lg); z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.err  { background: var(--red); }

    /* Loading */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; gap: 14px; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--pri); border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error-card { background: var(--surface); border-radius: var(--r); padding: 32px 24px; text-align: center; box-shadow: var(--shadow); margin-top: 40px; }
    .error-card .eicon { font-size: 44px; margin-bottom: 14px; }
    .error-card h2 { font-size: 18px; font-weight: 700; color: var(--red); margin-bottom: 8px; }
    .error-card p  { color: var(--txt-m); font-size: 14px; line-height: 1.6; }

    /* Config warning */
    .config-warn { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: var(--r); padding: 14px 16px; margin-bottom: 14px; font-size: 13px; color: #92400E; line-height: 1.5; }
    .config-warn b { display: block; margin-bottom: 3px; font-size: 14px; }
    .config-warn code { background: #FEF3C7; border-radius: 4px; padding: 1px 5px; font-family: monospace; font-size: 12px; }

    /* Spacer */
    .mb-12 { margin-bottom: 12px; }
    .mb-8  { margin-bottom: 8px; }
  </style>
</head>
<body>

<div id="app"></div>
<div id="toast"></div>

<!-- ═══════ MODAL: Asignar turno ═══════ -->
<div id="m-assign" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📋 Asignar turno</div>
    <div class="form-group">
      <label class="form-label" id="lbl-a">Producto A</label>
      <select class="form-control" id="sel-a"></select>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-b">Producto B</label>
      <select class="form-control" id="sel-b"></select>
      <div class="form-hint">Los miembros marcados con ★ ya completaron esta ronda</div>
    </div>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-assign')">Cancelar</button>
      <button class="btn-primary" onclick="handleAssign()">Guardar asignación</button>
    </div>
  </div>
</div>

<!-- ═══════ MODAL: Miembros ═══════ -->
<div id="m-members" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">👥 Gestionar miembros</div>
    <div id="edit-list"></div>
    <button class="btn-add-row" onclick="addEditRow()">+ Añadir miembro</button>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-members')">Cancelar</button>
      <button class="btn-primary" onclick="handleSaveMembers()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- ═══════ MODAL: Ajustes ═══════ -->
<div id="m-settings" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙ Ajustes</div>
    <div class="form-group">
      <label class="form-label">Nombre del producto A</label>
      <input class="form-control" id="set-a" type="text" placeholder="Ej: Leche">
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del producto B</label>
      <input class="form-control" id="set-b" type="text" placeholder="Ej: Galletas">
    </div>
    <div class="divider"></div>
    <div class="danger-zone">
      <div class="danger-label">⚠ Nueva ronda</div>
      <div class="danger-desc">Todos los miembros vuelven a "pendiente". Las fechas de última entrega se conservan.</div>
      <button class="btn-danger" onclick="handleReset()">🔄 Iniciar nueva ronda</button>
    </div>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-settings')">Cancelar</button>
      <button class="btn-primary" onclick="handleSaveSettings()">Guardar ajustes</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  ⚙  CONFIGURACIÓN  —  edita estos dos valores y guarda
// ═══════════════════════════════════════════════════════════
const API_KEY = 'TU_API_KEY_AQUI';
const BIN_ID  = 'TU_BIN_ID_AQUI';
// ═══════════════════════════════════════════════════════════

const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HDR     = { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' };

let S          = null;   // estado global
let toastTimer = null;

// ── Utilidades ────────────────────────────────────────────
function uid()  { return Math.random().toString(36).slice(2, 10); }
function esc(v) { return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (err ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}

function openSheet(id)  { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }

// ── JSONBin API ───────────────────────────────────────────
async function load() {
  const r = await fetch(`${BIN_URL}/latest`, { headers: HDR });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const d = await r.json();
  S = normalize(d.record);
}

async function save() {
  const r = await fetch(BIN_URL, { method: 'PUT', headers: HDR, body: JSON.stringify(S) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
}

async function persist(msg, closeId) {
  try {
    await save();
    toast(msg);
    if (closeId) closeSheet(closeId);
    render();
  } catch(e) {
    toast('Error al guardar: ' + e.message, true);
  }
}

// ── Normalización de estado ───────────────────────────────
function normalize(raw) {
  return {
    productNames: {
      A: raw?.productNames?.A || 'Producto A',
      B: raw?.productNames?.B || 'Producto B'
    },
    members: (raw?.members || []).map(m => ({
      id:       m.id       || uid(),
      name:     m.name     || '',
      status:   m.status   || 'pending',
      lastDate: m.lastDate || null
    })),
    assignments: {
      A: raw?.assignments?.A || null,
      B: raw?.assignments?.B || null
    },
    roundNumber: raw?.roundNumber || 1
  };
}

// ── Computed ──────────────────────────────────────────────
function assignedProducts(id) {
  const a = S.assignments.A === id;
  const b = S.assignments.B === id;
  if (a && b) return 'AB';
  if (a)      return 'A';
  if (b)      return 'B';
  return null;
}

function completedCount() {
  return S.members.filter(m => m.status === 'completed').length;
}

// ── Acciones de estado ────────────────────────────────────
async function doAssign(newA, newB) {
  // Miembros que pierden su asignación actual vuelven a 'pending'
  const prev = new Set([S.assignments.A, S.assignments.B].filter(Boolean));
  const next  = new Set([newA, newB].filter(Boolean));
  prev.forEach(id => {
    if (!next.has(id)) {
      const m = S.members.find(x => x.id === id);
      if (m && m.status === 'assigned') m.status = 'pending';
    }
  });
  // Aplicar nuevas asignaciones
  S.assignments.A = newA || null;
  S.assignments.B = newB || null;
  next.forEach(id => {
    const m = S.members.find(x => x.id === id);
    if (m) m.status = 'assigned';  // permite reasignar aunque ya completó
  });
  await persist('Turno asignado ✓', 'm-assign');
}

async function doConfirm(id) {
  const m = S.members.find(x => x.id === id);
  if (!m) return;
  m.status   = 'completed';
  m.lastDate = today();
  if (S.assignments.A === id) S.assignments.A = null;
  if (S.assignments.B === id) S.assignments.B = null;
  await persist(`${m.name} marcado como entregado ✓`);
}

async function doReset() {
  S.members.forEach(m => m.status = 'pending');
  S.assignments = { A: null, B: null };
  S.roundNumber = (S.roundNumber || 1) + 1;
  await persist('¡Nueva ronda iniciada! ✓', 'm-settings');
}

async function doSaveMembers(members) {
  S.members = members;
  if (S.assignments.A && !members.find(m => m.id === S.assignments.A)) S.assignments.A = null;
  if (S.assignments.B && !members.find(m => m.id === S.assignments.B)) S.assignments.B = null;
  await persist('Miembros actualizados ✓', 'm-members');
}

async function doSaveSettings(nameA, nameB) {
  S.productNames.A = nameA || 'Producto A';
  S.productNames.B = nameB || 'Producto B';
  await persist('Ajustes guardados ✓', 'm-settings');
}

// ── Handlers de UI ────────────────────────────────────────
function handleAssign() {
  const a = document.getElementById('sel-a').value;
  const b = document.getElementById('sel-b').value;
  if (!a && !b) { toast('Selecciona al menos un miembro', true); return; }
  doAssign(a || null, b || null);
}

function handleConfirm(id) {
  const m = S.members.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`¿Confirmar que ${m.name} ha realizado la entrega?`)) return;
  doConfirm(id);
}

function handleReset() {
  const total = S.members.length;
  const done  = completedCount();
  const msg   = done < total
    ? `Aún quedan ${total - done} miembros sin completar. ¿Iniciar nueva ronda de todas formas?`
    : '¿Iniciar una nueva ronda? Todos los miembros volverán a "pendiente".';
  if (!confirm(msg)) return;
  doReset();
}

function handleSaveMembers() {
  const rows    = document.querySelectorAll('#edit-list .edit-row');
  const members = [];
  let valid     = true;
  rows.forEach(row => {
    const input = row.querySelector('input');
    const name  = input.value.trim();
    if (!name) { valid = false; input.classList.add('error'); return; }
    input.classList.remove('error');
    const id       = row.dataset.id;
    const existing = S.members.find(m => m.id === id);
    members.push(existing ? { ...existing, name } : { id, name, status: 'pending', lastDate: null });
  });
  if (!valid) { toast('Hay campos en blanco', true); return; }
  doSaveMembers(members);
}

function handleSaveSettings() {
  const a = document.getElementById('set-a').value.trim();
  const b = document.getElementById('set-b').value.trim();
  doSaveSettings(a, b);
}

// ── Apertura de modales ───────────────────────────────────
function openAssign() {
  document.getElementById('lbl-a').textContent = S.productNames.A;
  document.getElementById('lbl-b').textContent = S.productNames.B;

  const buildOpts = (currentVal) => [
    '<option value="">— Sin asignar —</option>',
    ...S.members.map(m => {
      const star = m.status === 'completed' ? ' ★' : '';
      const sel  = currentVal === m.id ? ' selected' : '';
      return `<option value="${esc(m.id)}"${sel}>${esc(m.name)}${star}</option>`;
    })
  ].join('');

  document.getElementById('sel-a').innerHTML = buildOpts(S.assignments.A);
  document.getElementById('sel-b').innerHTML = buildOpts(S.assignments.B);
  openSheet('m-assign');
}

function openMembers() {
  document.getElementById('edit-list').innerHTML = S.members.map(m => `
    <div class="edit-row" data-id="${esc(m.id)}">
      <input type="text" value="${esc(m.name)}" placeholder="Nombre del miembro">
      <button class="btn-icon" onclick="this.closest('.edit-row').remove()" title="Eliminar">🗑</button>
    </div>
  `).join('');
  openSheet('m-members');
}

function addEditRow() {
  const list = document.getElementById('edit-list');
  const div  = document.createElement('div');
  div.className  = 'edit-row';
  div.dataset.id = uid();
  div.innerHTML  = `
    <input type="text" placeholder="Nombre del miembro">
    <button class="btn-icon" onclick="this.closest('.edit-row').remove()" title="Eliminar">🗑</button>
  `;
  list.appendChild(div);
  div.querySelector('input').focus();
}

function openSettings() {
  document.getElementById('set-a').value = S.productNames.A;
  document.getElementById('set-b').value = S.productNames.B;
  openSheet('m-settings');
}

async function refreshData() {
  try {
    await load();
    render();
    toast('Datos actualizados ✓');
  } catch(e) {
    toast('Error al actualizar', true);
  }
}

// ── Render principal ──────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  // Estado de error (sin conexión o sin configurar)
  if (!S) {
    app.innerHTML = `
      <div class="error-card">
        <div class="eicon">⚠️</div>
        <h2>No se pudo conectar</h2>
        <p>Comprueba que <strong>API_KEY</strong> y <strong>BIN_ID</strong> están configurados correctamente en el archivo HTML y que el Bin existe en JSONBin.</p>
      </div>`;
    return;
  }

  const total    = S.members.length;
  const done     = completedCount();
  const pct      = total > 0 ? Math.round(done / total * 100) : 0;
  const allDone  = total > 0 && done === total;
  const isSetup  = API_KEY !== 'TU_API_KEY_AQUI' && BIN_ID !== 'TU_BIN_ID_AQUI';

  // Aviso de configuración pendiente
  const configWarn = isSetup ? '' : `
    <div class="config-warn">
      <b>⚠️ App sin configurar</b>
      Edita el archivo HTML y sustituye <code>TU_API_KEY_AQUI</code> y <code>TU_BIN_ID_AQUI</code> por los valores de JSONBin.
    </div>`;

  // Sección de turno actual
  const assignedIds = [...new Set([S.assignments.A, S.assignments.B].filter(Boolean))];
  let assignSection = '';

  if (assignedIds.length > 0) {
    const cards = assignedIds.map(id => {
      const m = S.members.find(x => x.id === id);
      if (!m) return '';
      const ap       = assignedProducts(id);
      const isDone   = m.status === 'completed';
      const prodName = ap === 'AB'
        ? `${S.productNames.A} + ${S.productNames.B}`
        : (ap === 'A' ? S.productNames.A : S.productNames.B);
      const chipLabel = ap; // 'A', 'B', o 'AB'

      return `
        <div class="assign-card${isDone ? ' done' : ''}">
          <div class="product-chip">${esc(chipLabel)}</div>
          <div class="assign-info">
            <div class="assign-name">${esc(m.name)}</div>
            <div class="assign-sub">${esc(prodName)}</div>
          </div>
          ${isDone
            ? `<div class="chip-done">✓ Entregado</div>`
            : `<button class="btn-confirm" onclick="handleConfirm('${id}')">Confirmar</button>`
          }
        </div>`;
    }).join('');

    assignSection = `
      <div class="section-label">Turno actual</div>
      ${cards}
      <div class="mb-12"></div>`;
  }

  // Lista de miembros
  let memberList = '';
  if (total === 0) {
    memberList = `
      <div class="empty">
        <div class="empty-icon">👥</div>
        <div class="empty-title">Sin miembros todavía</div>
        <p class="txt-m">Pulsa "Miembros" en la esquina superior para añadir personas</p>
      </div>`;
  } else {
    const rows = S.members.map(m => {
      const ap = assignedProducts(m.id);
      const st = m.status || 'pending';
      let tags = '';
      if (ap === 'A' || ap === 'AB') tags += `<span class="tag tag-a">${esc(S.productNames.A)}</span>`;
      if (ap === 'B' || ap === 'AB') tags += `<span class="tag tag-b">${esc(S.productNames.B)}</span>`;
      if (m.lastDate)                tags += `<span class="tag tag-date">📅 ${esc(m.lastDate)}</span>`;

      return `
        <div class="member-row ${st}">
          <div class="member-info">
            <div class="member-name">${esc(m.name)}</div>
            ${tags ? `<div class="member-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    memberList = `<div class="member-list">${rows}</div>`;
  }

  // Renderizado completo
  app.innerHTML = `
    ${configWarn}

    <div class="app-header">
      <div>
        <div class="app-title">Turno de Clase</div>
        <div class="app-meta">
          <span class="round-pill">Ronda ${S.roundNumber}</span>
          <span class="txt-m">${done} de ${total} completados</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-outline" onclick="openMembers()">👥 Miembros</button>
        <button class="btn-outline" onclick="openSettings()">⚙</button>
        <button class="btn-outline" onclick="refreshData()" title="Actualizar datos">↻</button>
      </div>
    </div>

    <div class="progress-card mb-12">
      <div class="progress-inner">
        <div class="progress-frac">${done}<sup>/${total}</sup></div>
        <div class="progress-meta">
          <div class="progress-text">${allDone ? '🎉 ¡Todos han completado la ronda!' : `Progreso de la ronda · ${pct}%`}</div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
      </div>
    </div>

    ${assignSection}

    <div class="action-bar">
      <button class="btn-primary" onclick="openAssign()" ${total === 0 ? 'disabled' : ''}>
        📋 Asignar turno
      </button>
      ${allDone ? `<button class="btn-outline" onclick="handleReset()">🔄 Nueva ronda</button>` : ''}
    </div>

    <div class="section-label">Lista de miembros</div>
    ${memberList}
  `;
}

// ── Inicialización ────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="loader">
      <div class="spinner"></div>
      <span class="txt-m">Cargando datos...</span>
    </div>`;
  try { await load(); } catch(e) { S = null; }
  render();
}

// Cerrar sheet al pulsar fuera
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeSheet(el.id); });
});

init();
</script>
</body>
</html>
