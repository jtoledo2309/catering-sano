<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Grupo Heineken</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #182C22;
      --surface: #1F3529;
      --card:    #243C2E;
      --pri:     #C8D9B8;
      --pri-h:   #B5C9A5;
      --pri-txt: #182C22;
      --pri-l:   #1F3529;
      --green:   #C8D9B8;
      --green-l: #1F3529;
      --amber:   #E8A838;
      --amber-l: #2A2215;
      --red:     #F07878;
      --red-l:   #2A1818;
      --txt:     #EDF5EE;
      --txt-m:   #7FAE8A;
      --border:  #2B4235;
      --sh:      0 2px 8px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.3);
      --sh-lg:   0 8px 40px rgba(0,0,0,.6);
      --r:       16px;
      --r-sm:    10px;
      --pill:    100px;
      --font:    'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      /* Altura del sticky bar para calcular padding del body */
      --bar-h:   76px;
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--txt);
      min-height: 100vh;
      /* Reserva espacio para el sticky bar + safe area de iOS */
      padding-bottom: calc(var(--bar-h) + env(safe-area-inset-bottom, 0px));
      -webkit-tap-highlight-color: transparent;
    }
 
    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }
 
    /* ── Buttons ── */
    button { font-family: var(--font); cursor: pointer; border: none; }
 
    .btn-primary {
      background: var(--pri); color: var(--pri-txt);
      border-radius: var(--r-sm); padding: 15px 20px;
      font-size: 15px; font-weight: 700;
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      min-height: 52px; transition: background .15s; width: 100%;
    }
    .btn-primary:hover  { background: var(--pri-h); }
    .btn-primary:active { background: var(--pri-h); }
    .btn-primary:disabled { opacity: .35; cursor: not-allowed; }
 
    .btn-ghost {
      background: none; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 12px 18px;
      font-size: 14px; font-weight: 500; color: var(--txt-m);
      min-height: 48px; transition: all .15s;
    }
    .btn-ghost:hover { border-color: var(--txt-m); color: var(--txt); }
 
    .btn-outline {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      width: 46px; height: 46px; transition: all .15s;
    }
    .btn-outline:hover  { border-color: var(--pri); }
    .btn-outline:active { border-color: var(--pri); }
 
    .btn-danger {
      background: var(--red-l); color: var(--red);
      border-radius: var(--r-sm); padding: 13px 18px;
      font-size: 14px; font-weight: 600; min-height: 48px; transition: background .15s;
    }
    .btn-danger:hover { filter: brightness(1.1); }
 
    .btn-icon {
      width: 46px; height: 46px; border-radius: var(--r-sm);
      border: 1.5px solid var(--border); background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all .15s; flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--red); background: var(--red-l); }
 
    .btn-confirm {
      background: var(--pri); color: var(--pri-txt);
      border-radius: var(--r-sm); padding: 10px 16px;
      font-size: 13px; font-weight: 700; white-space: nowrap;
      min-height: 44px; transition: background .15s;
    }
    .btn-confirm:hover { background: var(--pri-h); }
 
    /* ── Header ── */
    .app-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 18px; padding-top: 8px;
    }
    .app-title {
      font-size: 26px; font-weight: 700; letter-spacing: -.5px;
      color: var(--pri); line-height: 1.1;
    }
    .app-meta { display: flex; align-items: center; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
    .header-actions { display: flex; gap: 8px; margin-left: 12px; padding-top: 4px; }
 
    .round-pill {
      display: inline-flex; align-items: center;
      background: var(--pri-l); border: 1px solid var(--border);
      color: var(--pri); border-radius: var(--pill); padding: 4px 11px;
      font-size: 11px; font-weight: 700; letter-spacing: .3px;
    }
    .txt-m { color: var(--txt-m); font-size: 13px; }
 
    .section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 1.2px;
      text-transform: uppercase; color: var(--txt-m); margin-bottom: 10px;
    }
 
    /* ── Progress card ── */
    .progress-card {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 20px; box-shadow: var(--sh); margin-bottom: 14px;
    }
    .progress-inner { display: flex; align-items: center; gap: 18px; }
    .progress-frac {
      font-size: 44px; font-weight: 700; color: var(--pri);
      line-height: 1; white-space: nowrap; letter-spacing: -1px;
    }
    .progress-frac sup { font-size: 18px; color: var(--txt-m); font-weight: 500; vertical-align: super; }
    .progress-meta { flex: 1; }
    .progress-text { font-size: 13px; color: var(--txt-m); margin-bottom: 8px; line-height: 1.4; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill  { height: 100%; background: var(--pri); border-radius: 3px; transition: width .5s ease; }
 
    /* ── Assignment cards ── */
    .assign-card {
      display: flex; align-items: center; gap: 14px;
      border-left: 4px solid var(--amber); border-radius: var(--r);
      background: var(--card); padding: 16px;
      box-shadow: var(--sh); margin-bottom: 10px;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .assign-card.done { border-left-color: var(--green); }
    .assign-card.done .product-chip { background: var(--green-l); color: var(--green); border-color: var(--green); }
 
    .product-chip {
      min-width: 46px; height: 46px; border-radius: 10px;
      background: var(--amber-l); color: var(--amber);
      border: 1.5px solid var(--amber);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
    }
    .assign-info { flex: 1; min-width: 0; }
    .assign-name { font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .assign-sub  { font-size: 13px; color: var(--txt-m); margin-top: 2px; }
    .chip-done {
      background: var(--green-l); color: var(--green); border: 1px solid var(--green);
      border-radius: var(--r-sm); padding: 8px 14px; font-size: 12px; font-weight: 700; white-space: nowrap;
    }
 
    /* ── Filter tabs ── */
    .filter-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .filter-tab {
      flex: 1; padding: 10px 6px; border-radius: var(--r-sm);
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--txt-m); font-size: 13px; font-weight: 600;
      font-family: var(--font); min-height: 44px; transition: all .15s;
    }
    .filter-tab.active {
      background: var(--pri-l); border-color: var(--pri); color: var(--pri);
    }
 
    /* ── Member list ── */
    .member-list { display: flex; flex-direction: column; gap: 8px; }
 
    .member-row {
      background: var(--card); border-radius: var(--r);
      padding: 16px; display: flex; align-items: center;
      box-shadow: var(--sh); border-left: 4px solid transparent;
      border-top: 1px solid var(--border);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      transition: border-color .25s; min-height: 68px;
    }
    .member-row.pending   { border-left-color: var(--border); }
    .member-row.assigned  { border-left-color: var(--amber); }
    .member-row.completed { border-left-color: var(--green); }
 
    .member-info { flex: 1; min-width: 0; }
    .member-name {
      font-weight: 600; font-size: 16px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .member-row.completed .member-name {
      color: var(--txt-m); text-decoration: line-through; text-decoration-color: var(--green);
    }
 
    .member-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .tag {
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: var(--pill); display: inline-flex; align-items: center; gap: 4px;
    }
    .tag-a    { background: var(--amber-l); color: var(--amber); border: 1px solid var(--amber); }
    .tag-b    { background: var(--pri-l);   color: var(--pri);   border: 1px solid var(--border); }
    .tag-date { background: var(--green-l); color: var(--green); border: 1px solid var(--green); font-weight: 700; }
 
    /* ── Sticky bar ── */
    .sticky-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: var(--bg);
      border-top: 1px solid var(--border);
      /* Padding superior fijo + padding inferior que absorbe el home indicator de iOS */
      padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }
    .sticky-bar-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      gap: 8px;
    }
    .sticky-bar-inner .btn-reset {
      background: none; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 12px 16px;
      font-size: 13px; font-weight: 600; color: var(--txt-m);
      white-space: nowrap; transition: all .15s; font-family: var(--font);
      min-height: 52px;
    }
    .sticky-bar-inner .btn-reset:hover { border-color: var(--pri); color: var(--pri); }
 
    /* ── Empty ── */
    .empty {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 52px 24px; text-align: center; box-shadow: var(--sh);
    }
    .empty-icon  { font-size: 44px; margin-bottom: 14px; }
    .empty-title { font-weight: 700; font-size: 17px; margin-bottom: 6px; color: var(--pri); }
 
    /* ── Bottom sheets ── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,.65); align-items: flex-end; justify-content: center;
    }
    .overlay.open { display: flex; }
 
    .sheet {
      background: var(--surface); border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--border);
      width: 100%; max-width: 480px; max-height: 92vh; overflow-y: auto;
      padding: 6px 20px;
      padding-bottom: calc(28px + env(safe-area-inset-bottom, 0px));
      box-shadow: var(--sh-lg);
    }
    .sheet-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 14px auto 22px; }
    .sheet-title  { font-size: 19px; font-weight: 700; margin-bottom: 22px; color: var(--pri); }
 
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px; color: var(--txt-m); margin-bottom: 8px;
    }
    .form-control {
      width: 100%; padding: 13px 16px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 16px; font-family: var(--font);
      color: var(--txt); background: var(--card);
      outline: none; transition: border-color .15s; appearance: none; min-height: 52px;
    }
    .form-control:focus { border-color: var(--pri); }
    .form-hint { font-size: 12px; color: var(--txt-m); margin-top: 5px; }
 
    .sheet-actions { display: flex; gap: 8px; margin-top: 26px; }
    .sheet-actions .btn-primary { width: auto; flex: 1; }
 
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
 
    .edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .edit-row input {
      flex: 1; padding: 13px 14px; border: 1.5px solid var(--border);
      border-radius: var(--r-sm); font-size: 16px; font-family: var(--font);
      color: var(--txt); background: var(--card); outline: none;
      transition: border-color .15s; min-height: 52px;
    }
    .edit-row input:focus { border-color: var(--pri); }
    .edit-row input.error { border-color: var(--red); }
 
    .btn-add-row {
      width: 100%; margin-top: 4px; padding: 14px;
      border: 2px dashed var(--border); border-radius: var(--r-sm);
      background: none; color: var(--txt-m); font-size: 15px; font-weight: 500;
      font-family: var(--font); min-height: 52px; transition: all .15s;
    }
    .btn-add-row:hover { border-color: var(--pri); color: var(--pri); }
 
    .danger-zone { padding-top: 4px; }
    .danger-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--red); margin-bottom: 8px; }
    .danger-desc  { font-size: 13px; color: var(--txt-m); margin-bottom: 14px; line-height: 1.6; }
 
    /* ── Toast ── */
    #toast {
      position: fixed; bottom: calc(var(--bar-h) + 12px + env(safe-area-inset-bottom, 0px)); left: 50%;
      transform: translateX(-50%) translateY(40px);
      background: var(--card); color: var(--txt); border: 1px solid var(--border);
      padding: 12px 22px; border-radius: var(--pill);
      font-size: 14px; font-weight: 600;
      box-shadow: var(--sh-lg); z-index: 999;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap; pointer-events: none; opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.err  { background: var(--red-l); color: var(--red); border-color: var(--red); }
 
    /* ── Loading / Error ── */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; }
    .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--pri); border-radius: 50%; animation: spin .75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
 
    .error-card {
      background: var(--card); border-radius: var(--r); border: 1px solid var(--border);
      padding: 36px 24px; text-align: center; box-shadow: var(--sh); margin-top: 40px;
    }
    .error-card .eicon { font-size: 48px; margin-bottom: 16px; }
    .error-card h2 { font-size: 18px; font-weight: 700; color: var(--red); margin-bottom: 10px; }
    .error-card p  { color: var(--txt-m); font-size: 14px; line-height: 1.7; }
 
    .config-warn {
      background: var(--amber-l); border: 1px solid var(--amber);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 14px;
      font-size: 13px; color: var(--amber); line-height: 1.5;
    }
    .config-warn b { display: block; margin-bottom: 3px; font-size: 14px; }
 
    .mb-14 { margin-bottom: 14px; }
  </style>
</head>
<body>
 
<div id="app"></div>
<div id="toast"></div>
 
<!-- Sticky bar: único elemento fijo en el HTML -->
<div class="sticky-bar">
  <div class="sticky-bar-inner" id="sticky-inner">
    <button class="btn-primary" disabled>📋 Asignar turno</button>
  </div>
</div>
 
<!-- ═══════ MODAL: Asignar turno ═══════ -->
<div id="m-assign" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">📋 Asignar turno</div>
    <div class="form-group">
      <label class="form-label" id="lbl-a">Producto A</label>
      <select class="form-control" id="sel-a"></select>
    </div>
    <div class="form-group">
      <label class="form-label" id="lbl-b">Producto B</label>
      <select class="form-control" id="sel-b"></select>
      <div class="form-hint">Los miembros marcados con ★ ya completaron esta ronda</div>
    </div>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-assign')">Cancelar</button>
      <button class="btn-primary" onclick="handleAssign()">Guardar</button>
    </div>
  </div>
</div>
 
<!-- ═══════ MODAL: Miembros ═══════ -->
<div id="m-members" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">👥 Gestionar miembros</div>
    <div id="edit-list"></div>
    <button class="btn-add-row" onclick="addEditRow()">+ Añadir miembro</button>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-members')">Cancelar</button>
      <button class="btn-primary" onclick="handleSaveMembers()">Guardar</button>
    </div>
  </div>
</div>
 
<!-- ═══════ MODAL: Ajustes ═══════ -->
<div id="m-settings" class="overlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🍻 Ajustes</div>
    <div class="form-group">
      <label class="form-label">Nombre del producto A</label>
      <input class="form-control" id="set-a" type="text" placeholder="Ej: Cerveza">
    </div>
    <div class="form-group">
      <label class="form-label">Nombre del producto B</label>
      <input class="form-control" id="set-b" type="text" placeholder="Ej: Pollo">
    </div>
    <div class="divider"></div>
    <div class="danger-zone">
      <div class="danger-label">⚠ Nueva ronda</div>
      <div class="danger-desc">Todos los miembros vuelven a "pendiente" y se borra el historial de fechas de esta ronda.</div>
      <button class="btn-danger" onclick="handleReset()">🔄 Iniciar nueva ronda</button>
    </div>
    <div class="sheet-actions">
      <button class="btn-ghost" onclick="closeSheet('m-settings')">Cancelar</button>
      <button class="btn-primary" onclick="handleSaveSettings()">Guardar</button>
    </div>
  </div>
</div>
 
<script>
// ═══════════════════════════════════════════════════════════
//  ⚙  CONFIGURACIÓN  —  edita estos dos valores y guarda
// ═══════════════════════════════════════════════════════════
const API_KEY = '$2a$10$EX9QUVZw3nVG3ndTgiBfqO7dP8EAIDw4II0a58ktftvwfEc4yJsvW';
const BIN_ID  = '6a3554cfda38895dfede0b4b';
// ═══════════════════════════════════════════════════════════
 
const ICON_A = '🍺';
const ICON_B = '🍗';
 
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
const HDR     = { 'X-Master-Key': API_KEY, 'Content-Type': 'application/json' };
 
let S             = null;
let currentFilter = 'all';
let toastTimer    = null;
 
// ── Utilidades ────────────────────────────────────────────
function uid()  { return Math.random().toString(36).slice(2, 10); }
function esc(v) { return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() {
  const d = new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
 
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show' + (err ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.className = '', 2800);
}
 
function openSheet(id)  { document.getElementById(id).classList.add('open'); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
function setFilter(f)   { currentFilter = f; render(); }
 
// ── JSONBin API ───────────────────────────────────────────
async function load() {
  const r = await fetch(`${BIN_URL}/latest`, { headers: HDR });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  S = normalize((await r.json()).record);
}
 
async function save() {
  const r = await fetch(BIN_URL, { method: 'PUT', headers: HDR, body: JSON.stringify(S) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
}
 
async function persist(msg, closeId) {
  try {
    await save();
    toast(msg);
    if (closeId) closeSheet(closeId);
    render();
  } catch(e) {
    toast('Error al guardar: ' + e.message, true);
  }
}
 
// ── Normalización ─────────────────────────────────────────
function normalize(raw) {
  return {
    productNames: {
      A: raw?.productNames?.A || 'Producto A',
      B: raw?.productNames?.B || 'Producto B'
    },
    members: (raw?.members || []).map(m => ({
      id:                m.id                || uid(),
      name:              m.name              || '',
      status:            m.status            || 'pending',
      lastDate:          m.lastDate          || null,
      deliveredProducts: m.deliveredProducts || null
    })),
    assignments: {
      A: raw?.assignments?.A || null,
      B: raw?.assignments?.B || null
    },
    roundNumber: raw?.roundNumber || 1
  };
}
 
// ── Computed ──────────────────────────────────────────────
function assignedProducts(id) {
  const a = S.assignments.A === id;
  const b = S.assignments.B === id;
  if (a && b) return 'AB';
  if (a)      return 'A';
  if (b)      return 'B';
  return null;
}
 
function completedCount() {
  return S.members.filter(m => m.status === 'completed').length;
}
 
function filteredMembers() {
  if (currentFilter === 'all') return S.members;
  return S.members.filter(m => {
    const dp = m.deliveredProducts;
    if (!dp) return false;
    if (currentFilter === 'A') return dp === 'A' || dp === 'AB';
    if (currentFilter === 'B') return dp === 'B' || dp === 'AB';
    return true;
  });
}
 
// ── Acciones ──────────────────────────────────────────────
async function doAssign(newA, newB) {
  const prev = new Set([S.assignments.A, S.assignments.B].filter(Boolean));
  const next  = new Set([newA, newB].filter(Boolean));
  prev.forEach(id => {
    if (!next.has(id)) {
      const m = S.members.find(x => x.id === id);
      if (m && m.status === 'assigned') m.status = 'pending';
    }
  });
  S.assignments.A = newA || null;
  S.assignments.B = newB || null;
  next.forEach(id => {
    const m = S.members.find(x => x.id === id);
    if (m) m.status = 'assigned';
  });
  await persist('Turno asignado ✓', 'm-assign');
}
 
async function doConfirm(id) {
  const m = S.members.find(x => x.id === id);
  if (!m) return;
  const didA = S.assignments.A === id;
  const didB = S.assignments.B === id;
  m.deliveredProducts = (didA && didB) ? 'AB' : (didA ? 'A' : 'B');
  m.status   = 'completed';
  m.lastDate = today();
  if (S.assignments.A === id) S.assignments.A = null;
  if (S.assignments.B === id) S.assignments.B = null;
  await persist(`${m.name} marcado como entregado ✓`);
}
 
async function doReset() {
  // Reset completo: estado, fechas e iconos — el listado queda limpio
  S.members.forEach(m => {
    m.status            = 'pending';
    m.lastDate          = null;
    m.deliveredProducts = null;
  });
  S.assignments = { A: null, B: null };
  S.roundNumber = (S.roundNumber || 1) + 1;
  currentFilter = 'all';
  await persist('¡Nueva ronda iniciada! ✓', 'm-settings');
}
 
async function doSaveMembers(members) {
  S.members = members;
  if (S.assignments.A && !members.find(m => m.id === S.assignments.A)) S.assignments.A = null;
  if (S.assignments.B && !members.find(m => m.id === S.assignments.B)) S.assignments.B = null;
  await persist('Miembros actualizados ✓', 'm-members');
}
 
async function doSaveSettings(nameA, nameB) {
  S.productNames.A = nameA || 'Producto A';
  S.productNames.B = nameB || 'Producto B';
  await persist('Ajustes guardados ✓', 'm-settings');
}
 
// ── Handlers ──────────────────────────────────────────────
function handleAssign() {
  const a = document.getElementById('sel-a').value;
  const b = document.getElementById('sel-b').value;
  if (!a && !b) { toast('Selecciona al menos un miembro', true); return; }
  doAssign(a || null, b || null);
}
 
function handleConfirm(id) {
  const m = S.members.find(x => x.id === id);
  if (!m) return;
  if (!confirm(`¿Confirmar que ${m.name} ha realizado la entrega?`)) return;
  doConfirm(id);
}
 
function handleReset() {
  const done  = completedCount();
  const total = S.members.length;
  const msg   = done < total
    ? `Aún quedan ${total - done} miembros sin completar. ¿Iniciar nueva ronda de todas formas?`
    : '¿Iniciar una nueva ronda? Todos los miembros quedarán en blanco.';
  if (!confirm(msg)) return;
  doReset();
}
 
function handleSaveMembers() {
  const rows    = document.querySelectorAll('#edit-list .edit-row');
  const members = [];
  let valid     = true;
  rows.forEach(row => {
    const input = row.querySelector('input');
    const name  = input.value.trim();
    if (!name) { valid = false; input.classList.add('error'); return; }
    input.classList.remove('error');
    const id       = row.dataset.id;
    const existing = S.members.find(m => m.id === id);
    members.push(existing
      ? { ...existing, name }
      : { id, name, status: 'pending', lastDate: null, deliveredProducts: null });
  });
  if (!valid) { toast('Hay campos en blanco', true); return; }
  doSaveMembers(members);
}
 
function handleSaveSettings() {
  doSaveSettings(
    document.getElementById('set-a').value.trim(),
    document.getElementById('set-b').value.trim()
  );
}
 
// ── Modal openers ─────────────────────────────────────────
function openAssign() {
  document.getElementById('lbl-a').textContent = S.productNames.A;
  document.getElementById('lbl-b').textContent = S.productNames.B;
  const buildOpts = (cur) => [
    '<option value="">— Sin asignar —</option>',
    ...S.members.map(m => {
      const star = m.status === 'completed' ? ' ★' : '';
      return `<option value="${esc(m.id)}"${cur === m.id ? ' selected' : ''}>${esc(m.name)}${star}</option>`;
    })
  ].join('');
  document.getElementById('sel-a').innerHTML = buildOpts(S.assignments.A);
  document.getElementById('sel-b').innerHTML = buildOpts(S.assignments.B);
  openSheet('m-assign');
}
 
function openMembers() {
  document.getElementById('edit-list').innerHTML = S.members.map(m => `
    <div class="edit-row" data-id="${esc(m.id)}">
      <input type="text" value="${esc(m.name)}" placeholder="Nombre del miembro">
      <button class="btn-icon" onclick="this.closest('.edit-row').remove()">🗑</button>
    </div>`).join('');
  openSheet('m-members');
}
 
function addEditRow() {
  const div = document.createElement('div');
  div.className  = 'edit-row';
  div.dataset.id = uid();
  div.innerHTML  = `
    <input type="text" placeholder="Nombre del miembro">
    <button class="btn-icon" onclick="this.closest('.edit-row').remove()">🗑</button>`;
  document.getElementById('edit-list').appendChild(div);
  div.querySelector('input').focus();
}
 
function openSettings() {
  document.getElementById('set-a').value = S.productNames.A;
  document.getElementById('set-b').value = S.productNames.B;
  openSheet('m-settings');
}
 
async function refreshData() {
  try { await load(); render(); toast('Datos actualizados ✓'); }
  catch(e) { toast('Error al actualizar', true); }
}
 
// ── Render ────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
 
  if (!S) {
    app.innerHTML = `
      <div class="error-card">
        <div class="eicon">⚠️</div>
        <h2>No se pudo conectar</h2>
        <p>Comprueba que <strong>API_KEY</strong> y <strong>BIN_ID</strong> están configurados en el archivo HTML.</p>
      </div>`;
    document.getElementById('sticky-inner').innerHTML =
      `<button class="btn-primary" disabled>📋 Asignar turno</button>`;
    return;
  }
 
  const total   = S.members.length;
  const done    = completedCount();
  const pct     = total > 0 ? Math.round(done / total * 100) : 0;
  const allDone = total > 0 && done === total;
  const isSetup = API_KEY !== 'TU_API_KEY_AQUI' && BIN_ID !== 'TU_BIN_ID_AQUI';
 
  // Turno actual
  const assignedIds = [...new Set([S.assignments.A, S.assignments.B].filter(Boolean))];
  let assignHtml = '';
  if (assignedIds.length > 0) {
    const cards = assignedIds.map(id => {
      const m = S.members.find(x => x.id === id);
      if (!m) return '';
      const ap     = assignedProducts(id);
      const isDone = m.status === 'completed';
      const prodName = ap === 'AB'
        ? `${S.productNames.A} + ${S.productNames.B}`
        : (ap === 'A' ? S.productNames.A : S.productNames.B);
      return `
        <div class="assign-card${isDone ? ' done' : ''}">
          <div class="product-chip">${esc(ap)}</div>
          <div class="assign-info">
            <div class="assign-name">${esc(m.name)}</div>
            <div class="assign-sub">${esc(prodName)}</div>
          </div>
          ${isDone
            ? `<div class="chip-done">✓ Entregado</div>`
            : `<button class="btn-confirm" onclick="handleConfirm('${id}')">Confirmar</button>`}
        </div>`;
    }).join('');
    assignHtml = `<div class="section-label">Turno actual</div>${cards}<div class="mb-14"></div>`;
  }
 
  // Filtros
  const filterHtml = `
    <div class="filter-tabs">
      <button class="filter-tab${currentFilter === 'all' ? ' active' : ''}" onclick="setFilter('all')">Todos</button>
      <button class="filter-tab${currentFilter === 'A'   ? ' active' : ''}" onclick="setFilter('A')">${ICON_A} ${esc(S.productNames.A)}</button>
      <button class="filter-tab${currentFilter === 'B'   ? ' active' : ''}" onclick="setFilter('B')">${ICON_B} ${esc(S.productNames.B)}</button>
    </div>`;
 
  // Lista de miembros
  const members = filteredMembers();
  let memberHtml = '';
  if (total === 0) {
    memberHtml = `
      <div class="empty">
        <div class="empty-icon">🍻</div>
        <div class="empty-title">Sin miembros todavía</div>
        <p class="txt-m">Pulsa 👥 arriba para añadir a los del grupo</p>
      </div>`;
  } else if (members.length === 0) {
    memberHtml = `
      <div class="empty">
        <div class="empty-icon">${currentFilter === 'A' ? ICON_A : ICON_B}</div>
        <div class="empty-title">Nadie todavía</div>
        <p class="txt-m">Aún no hay nadie que haya llevado este producto</p>
      </div>`;
  } else {
    const rows = members.map(m => {
      const ap = assignedProducts(m.id);
      const st = m.status || 'pending';
      let tags = '';
      if (ap === 'A' || ap === 'AB') tags += `<span class="tag tag-a">${esc(S.productNames.A)}</span>`;
      if (ap === 'B' || ap === 'AB') tags += `<span class="tag tag-b">${esc(S.productNames.B)}</span>`;
      if (m.lastDate) {
        const dp    = m.deliveredProducts;
        const icons = dp === 'AB' ? `${ICON_A}${ICON_B}` : (dp === 'A' ? ICON_A : (dp === 'B' ? ICON_B : ''));
        tags += `<span class="tag tag-date">${esc(m.lastDate)}${icons ? ' ' + icons : ''}</span>`;
      }
      return `
        <div class="member-row ${st}">
          <div class="member-info">
            <div class="member-name">${esc(m.name)}</div>
            ${tags ? `<div class="member-tags">${tags}</div>` : ''}
          </div>
        </div>`;
    }).join('');
    memberHtml = `<div class="member-list">${rows}</div>`;
  }
 
  // Render principal
  app.innerHTML = `
    ${!isSetup ? `<div class="config-warn"><b>⚠️ App sin configurar</b>Edita el HTML con tu API_KEY y BIN_ID de JSONBin.</div>` : ''}
    <div class="app-header">
      <div>
        <div class="app-title">Grupo Heineken</div>
        <div class="app-meta">
          <span class="round-pill">Ronda ${S.roundNumber}</span>
          <span class="txt-m">${done} de ${total} completados</span>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-outline" onclick="openMembers()" title="Miembros">👥</button>
        <button class="btn-outline" onclick="openSettings()" title="Ajustes">🍻</button>
        <button class="btn-outline" onclick="refreshData()" title="Actualizar">↻</button>
      </div>
    </div>
 
    <div class="progress-card mb-14">
      <div class="progress-inner">
        <div class="progress-frac">${done}<sup>/${total}</sup></div>
        <div class="progress-meta">
          <div class="progress-text">${allDone ? '🎉 ¡Todos han completado la ronda!' : `Progreso · ${pct}%`}</div>
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
      </div>
    </div>
 
    ${assignHtml}
 
    <div class="section-label">Lista de miembros</div>
    ${filterHtml}
    ${memberHtml}
  `;
 
  // Actualizar sticky bar (único punto donde se modifica)
  document.getElementById('sticky-inner').innerHTML = `
    <button class="btn-primary" onclick="openAssign()" ${total === 0 ? 'disabled' : ''}>
      📋 Asignar turno
    </button>
    ${allDone ? `<button class="btn-reset" onclick="handleReset()">🔄 Nueva ronda</button>` : ''}
  `;
}
 
// ── Init ──────────────────────────────────────────────────
async function init() {
  document.getElementById('app').innerHTML = `
    <div class="loader"><div class="spinner"></div><span class="txt-m">Cargando...</span></div>`;
  try { await load(); } catch(e) { S = null; }
  render();
}
 
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeSheet(el.id); });
});
 
init();
</script>
</body>
</html>
